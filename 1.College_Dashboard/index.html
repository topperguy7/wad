<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>AdminPanel</h2>
            <ul>
                <li><a href="#" class="active">Dashboard</a></li>
                <li><a href="#">Users </a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Reports</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>System Overview</h1>
                <div class="user-profile">Welcome, Admin</div>
            </header>

            <section class="stats-grid">
                <div class="card">
                    <h3>Total Sales</h3>
                    <p class="value">$24,500</p>
                </div>
                <div class="card">
                    <h3>Revenue</h3>
                    <p class="value">$12,200</p>
                </div>
            </section>

            <section class="table-container">
                <h2>Recent Activity</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#001</td>
                            <td>John Doe</td>
                            <td><span class="status-done">Completed</span></td>
                            <td>2024-05-01</td>
                        </tr>
                        <tr>
                            <td>#002</td>
                            <td>Jane Smith</td>
                            <td><span class="status-pending">Pending</span></td>
                            <td>2024-05-03</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>
