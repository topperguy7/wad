<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Join Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Create Account</h2>
        <form>
            <div class="form-group">
                <input type="text" placeholder="First Name" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Last Name" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password (Min 6 chars)" minlength="6" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Mobile Number" required>
            </div>
            <div class="form-group">
                <textarea placeholder="Residential Address" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn">Register Now</button>
        </form>
        <p class="auth-footer">Already a member? <a href="login.html">Login</a></p>
    </div>
</body>
</html>
