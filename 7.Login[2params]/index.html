<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h2>Account Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="At least 8 chars, 1 Upper, 1 Special, 1 Num">
                <small class="error" id="userError"></small>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="At least 8 chars, 1 Upper, 1 Special">
                <small class="error" id="passError"></small>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
