<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .registration-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        .gender-group {
            margin: 10px 0;
        }
        .btn-submit {
            width: 100%;
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="registration-box">
    <h2>Register</h2>
    <form action="#" method="post">
        
        <div class="form-group">
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="firstname" placeholder="Enter First Name" required>
        </div>

        <div class="form-group">
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lastname" placeholder="Enter Last Name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="pwd">Password:</label>
            <input type="password" id="pwd" name="password" required>
        </div>

        <div class="gender-group">
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label style="display:inline; font-weight:normal;" for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label style="display:inline; font-weight:normal;" for="female">Female</label>
        </div>

        <div class="form-group">
            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="usa">USA</option>
                <option value="uk">UK</option>
                <option value="india">India</option>
                <option value="canada">Canada</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Sign Up</button>

    </form>
</div>

</body>
</html>
