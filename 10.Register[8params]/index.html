<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>User Registration</h2>
        <form id="registrationForm">
            <!-- 1. Name -->
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>

            <!-- 2. Password -->
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <!-- 3. E-mail -->
            <div class="field">
                <label>Email ID</label>
                <input type="email" id="email" placeholder="name@domain.com" required>
            </div>

            <!-- 4. Phone Number with Dropdown -->
            <div class="field">
                <label>Phone Number</label>
                <div class="phone-input">
                    <select id="countryCode">
                        <option value="+91">+91 (IN)</option>
                        <option value="+1">+1 (US)</option>
                        <option value="+44">+44 (UK)</option>
                    </select>
                    <input type="text" id="phone" placeholder="10-digit number" maxlength="10" required>
                </div>
            </div>

            <!-- 5. Sex (Radio) -->
            <div class="field">
                <label>Sex</label>
                <input type="radio" name="sex" value="Male" required> Male
                <input type="radio" name="sex" value="Female"> Female
                <input type="radio" name="sex" value="Other"> Other
            </div>

            <!-- 6. Date of Birth (3 Select Boxes) -->
            <div class="field">
                <label>Date of Birth</label>
                <div class="dob-input">
                    <select id="day"></select>
                    <select id="month">
                        <option value="Jan">Jan</option><option value="Feb">Feb</option>
                        <option value="Mar">Mar</option><option value="Apr">Apr</option>
                        <option value="May">May</option><option value="Jun">Jun</option>
                        <option value="Jul">Jul</option><option value="Aug">Aug</option>
                        <option value="Sep">Sep</option><option value="Oct">Oct</option>
                        <option value="Nov">Nov</option><option value="Dec">Dec</option>
                    </select>
                    <select id="year"></select>
                </div>
            </div>

            <!-- 7. Languages Known (Checkboxes) -->
            <div class="field">
                <label>Languages Known</label>
                <input type="checkbox" name="lang" value="English"> English
                <input type="checkbox" name="lang" value="Marathi"> Marathi
                <input type="checkbox" name="lang" value="Hindi"> Hindi
                <input type="checkbox" name="lang" value="Tamil"> Tamil
            </div>

            <!-- 8. Address -->
            <div class="field">
                <label>Address</label>
                <textarea id="address" rows="4"></textarea>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
