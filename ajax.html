<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Ajax Implementation</title>
    <style>
      body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #ajaxBtn{
        font-size: 2rem;
        border: 2px solid greenyellow;
        border-radius: 10px;
        background: goldenrod;
        transition: all 0.2s ease-in-out;
        cursor: pointer;
      }
      #ajaxBtn:hover{
        transform: translateY(-2px); 
      }
    </style>
  </head>
  <body>
    <h1>Ajax Implementation</h1>
    <button id="ajaxBtn">Click Me</button>
    <h2 id="data">Data will be shown here</h2>
  </body>
  <script>
    const btn = document.getElementById("ajaxBtn");
    const data = document.getElementById("data");

    btn.addEventListener("click", ()=>{
      const xhr = new XMLHttpRequest();

      xhr.open("GET", "file.json", true);

      xhr.onreadystatechange = ()=>{
        if(xhr.readyState === 4 && xhr.status === 200){
          const res = JSON.parse(xhr.responseText);

          data.innerText = res.user.join(",");
        } else{
          data.innerText = "No Data Present";
        }
      };

      xhr.send();
    });
  </script>
</html>
