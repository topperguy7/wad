<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration - AJAX Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Register User</h2>
        <form id="regForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Submit via AJAX</button>
        </form>
        <br>
        <a href="list.html">View Registered Users</a>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. Capture Data
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            // 2. Push to Local Storage (Array)
            let users = JSON.parse(localStorage.getItem('userList')) || [];
            users.push(userData);
            localStorage.setItem('userList', JSON.stringify(users));

            // 3. AJAX POST Method (Using Fetch API)
            // Note: We use a placeholder API (JSONPlaceholder) for demonstration
            fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                body: JSON.stringify(userData),
                headers: {
                    'Content-type': 'application/json; charset=UTF-8',
                },
            })
            .then(response => response.json())
            .then(json => {
                console.log('Success (AJAX):', json);
                alert('User Registered and Data Sent via AJAX!');
                document.getElementById('regForm').reset();
            })
            .catch(err => console.error('Error:', err));
        });
    </script>
</body>
</html>
