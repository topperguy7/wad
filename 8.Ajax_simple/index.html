<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Implementation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
        #output {
            margin-top: 20px;
            text-align: left;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fafafa;
            min-height: 50px;
        }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AJAX Data Fetcher</h2>
        <p>Click the button to load data asynchronously.</p>
        <button id="loadData">Fetch Random User</button>

        <div id="output">
            User data will appear here...
        </div>
    </div>

    <script>
        document.getElementById('loadData').addEventListener('click', function() {
            const outputDiv = document.getElementById('output');
            
            // Show loading state
            outputDiv.innerHTML = '<span class="loading">Fetching data...</span>';

            // 1. The AJAX Concept (Using Fetch API)
            fetch('https://jsonplaceholder.typicode.com/users/1')
                .then(response => {
                    // 2. Check if the request was successful
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json(); // Parse JSON data
                })
                .then(data => {
                    // 3. Update the UI with the fetched data
                    outputDiv.innerHTML = `
                        <strong>Name:</strong> ${data.name} <br>
                        <strong>Email:</strong> ${data.email} <br>
                        <strong>City:</strong> ${data.address.city} <br>
                        <strong>Company:</strong> ${data.company.name}
                    `;
                })
                .catch(error => {
                    // 4. Handle any errors
                    outputDiv.innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
                });
        });
    </script>

</body>
</html>
